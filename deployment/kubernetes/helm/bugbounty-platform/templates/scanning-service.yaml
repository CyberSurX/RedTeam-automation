{{/*
Create the scanning service deployment
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-scanning-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanning-service
spec:
  replicas: {{ .Values.scanningService.replicaCount }}
  selector:
    matchLabels:
      {{- include "bugbounty-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scanning-service
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.scanningService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bugbounty-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scanning-service
    spec:
      {{- include "bugbounty-platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "bugbounty-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.scanningService.podSecurityContext | nindent 8 }}
      containers:
        - name: scanning-service
          securityContext:
            {{- toYaml .Values.scanningService.securityContext | nindent 12 }}
          image: {{ include "bugbounty-platform.image" (dict "image" .Values.scanningService.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.scanningService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.scanningService.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- if .Values.livenessProbe.enabled }}
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            {{- end }}
          readinessProbe:
            {{- if .Values.readinessProbe.enabled }}
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            {{- end }}
          resources:
            {{- toYaml .Values.scanningService.resources | nindent 12 }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.scanningService.service.targetPort | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ include "bugbounty-platform.database.user" . }}:$(POSTGRES_PASSWORD)@{{ include "bugbounty-platform.database.host" . }}:{{ include "bugbounty-platform.database.port" . }}/{{ include "bugbounty-platform.database.name" . }}"
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@{{ include "bugbounty-platform.redis.host" . }}:{{ include "bugbounty-platform.redis.port" . }}"
            - name: NMAP_ENABLED
              value: {{ .Values.scanningService.config.scanners.nmap.enabled | quote }}
            - name: NMAP_MAX_HOSTS
              value: {{ .Values.scanningService.config.scanners.nmap.maxHosts | quote }}
            - name: NMAP_MAX_PORTS
              value: {{ .Values.scanningService.config.scanners.nmap.maxPorts | quote }}
            - name: NMAP_TIMEOUT
              value: {{ .Values.scanningService.config.scanners.nmap.timeout | quote }}
            - name: NIKTO_ENABLED
              value: {{ .Values.scanningService.config.scanners.nikto.enabled | quote }}
            - name: NIKTO_TIMEOUT
              value: {{ .Values.scanningService.config.scanners.nikto.timeout | quote }}
            - name: SQLMAP_ENABLED
              value: {{ .Values.scanningService.config.scanners.sqlmap.enabled | quote }}
            - name: SQLMAP_MAX_THREADS
              value: {{ .Values.scanningService.config.scanners.sqlmap.maxThreads | quote }}
            - name: SQLMAP_TIMEOUT
              value: {{ .Values.scanningService.config.scanners.sqlmap.timeout | quote }}
            - name: WAPITI_ENABLED
              value: {{ .Values.scanningService.config.scanners.wapiti.enabled | quote }}
            - name: WAPITI_MAX_URLS
              value: {{ .Values.scanningService.config.scanners.wapiti.maxUrls | quote }}
            - name: WAPITI_TIMEOUT
              value: {{ .Values.scanningService.config.scanners.wapiti.timeout | quote }}
            - name: MAX_CONCURRENT_SCANS
              value: {{ .Values.scanningService.config.rateLimiting.maxConcurrentScans | quote }}
            - name: SCAN_TIMEOUT
              value: {{ .Values.scanningService.config.rateLimiting.scanTimeout | quote }}
            - name: RESULTS_RETENTION_DAYS
              value: {{ .Values.scanningService.config.storage.resultsRetentionDays | quote }}
            - name: MAX_STORAGE_SIZE
              value: {{ .Values.scanningService.config.storage.maxStorageSize | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-postgresql
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-redis
                  key: password
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.scanningService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- with .Values.scanningService.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- with .Values.scanningService.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.scanningService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scanningService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scanningService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bugbounty-platform.scanningService.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanning-service
spec:
  type: {{ .Values.scanningService.service.type }}
  ports:
    - port: {{ .Values.scanningService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bugbounty-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: scanning-service
---
{{- if .Values.scanningService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-scanning-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: scanning-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "bugbounty-platform.fullname" . }}-scanning-service
  minReplicas: {{ .Values.scanningService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.scanningService.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.scanningService.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.scanningService.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.scanningService.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.scanningService.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}