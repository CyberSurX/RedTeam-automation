{{/*
Create the triage service deployment
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-triage-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: triage-service
spec:
  replicas: {{ .Values.triageService.replicaCount }}
  selector:
    matchLabels:
      {{- include "bugbounty-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: triage-service
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.triageService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bugbounty-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: triage-service
    spec:
      {{- include "bugbounty-platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "bugbounty-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.triageService.podSecurityContext | nindent 8 }}
      containers:
        - name: triage-service
          securityContext:
            {{- toYaml .Values.triageService.securityContext | nindent 12 }}
          image: {{ include "bugbounty-platform.image" (dict "image" .Values.triageService.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.triageService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.triageService.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- if .Values.livenessProbe.enabled }}
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            {{- end }}
          readinessProbe:
            {{- if .Values.readinessProbe.enabled }}
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            {{- end }}
          resources:
            {{- toYaml .Values.triageService.resources | nindent 12 }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.triageService.service.targetPort | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ include "bugbounty-platform.database.user" . }}:$(POSTGRES_PASSWORD)@{{ include "bugbounty-platform.database.host" . }}:{{ include "bugbounty-platform.database.port" . }}/{{ include "bugbounty-platform.database.name" . }}"
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@{{ include "bugbounty-platform.redis.host" . }}:{{ include "bugbounty-platform.redis.port" . }}"
            - name: DEDUPLICATION_ENABLED
              value: {{ .Values.triageService.config.deduplication.enabled | quote }}
            - name: SIMILARITY_THRESHOLD
              value: {{ .Values.triageService.config.deduplication.similarityThreshold | quote }}
            - name: TIME_WINDOW
              value: {{ .Values.triageService.config.deduplication.timeWindow | quote }}
            - name: CVSS_WEIGHT
              value: {{ .Values.triageService.config.severityCalculation.cvssWeight | quote }}
            - name: IMPACT_WEIGHT
              value: {{ .Values.triageService.config.severityCalculation.impactWeight | quote }}
            - name: EXPLOITABILITY_WEIGHT
              value: {{ .Values.triageService.config.severityCalculation.exploitabilityWeight | quote }}
            - name: AUTO_CLOSE_DUPLICATES
              value: {{ .Values.triageService.config.automation.autoCloseDuplicates | quote }}
            - name: AUTO_ASSIGN_LOW_SEVERITY
              value: {{ .Values.triageService.config.automation.autoAssignLowSeverity | quote }}
            - name: AUTO_ESCALATE_CRITICAL
              value: {{ .Values.triageService.config.automation.autoEscalateCritical | quote }}
            - name: HACKERONE_ENABLED
              value: {{ .Values.triageService.config.integration.hackerone.enabled | quote }}
            - name: HACKERONE_API_URL
              value: {{ .Values.triageService.config.integration.hackerone.apiUrl | quote }}
            - name: BUGCROWD_ENABLED
              value: {{ .Values.triageService.config.integration.bugcrowd.enabled | quote }}
            - name: BUGCROWD_API_URL
              value: {{ .Values.triageService.config.integration.bugcrowd.apiUrl | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-postgresql
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-redis
                  key: password
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.triageService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- with .Values.triageService.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- with .Values.triageService.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.triageService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.triageService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.triageService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bugbounty-platform.triageService.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: triage-service
spec:
  type: {{ .Values.triageService.service.type }}
  ports:
    - port: {{ .Values.triageService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bugbounty-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: triage-service
---
{{- if .Values.triageService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-triage-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: triage-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "bugbounty-platform.fullname" . }}-triage-service
  minReplicas: {{ .Values.triageService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.triageService.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.triageService.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.triageService.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.triageService.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.triageService.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}