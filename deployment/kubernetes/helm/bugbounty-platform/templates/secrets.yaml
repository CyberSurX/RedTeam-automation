{{/*
Create the secrets for the platform
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-secret: {{ .Values.apiGateway.config.auth.jwtSecret | default (randAlphaNum 32) | b64enc | quote }}
  api-secret: {{ .Values.apiGateway.config.auth.apiSecret | default (randAlphaNum 32) | b64enc | quote }}
  encryption-key: {{ .Values.apiGateway.config.auth.encryptionKey | default (randAlphaNum 32) | b64enc | quote }}
---
{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.postgresql.auth.postgresPassword }}
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  {{- else }}
  postgres-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.auth.password }}
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.auth.replicationPassword }}
  replication-password: {{ .Values.postgresql.auth.replicationPassword | b64enc | quote }}
  {{- else }}
  replication-password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.redis.auth.password }}
  password: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 16 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password: {{ .Values.grafana.adminPassword | default "admin" | b64enc | quote }}
{{- end }}