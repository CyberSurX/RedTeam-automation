{{/*
Create the reporting service deployment
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-reporting-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: reporting-service
spec:
  replicas: {{ .Values.reportingService.replicaCount }}
  selector:
    matchLabels:
      {{- include "bugbounty-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: reporting-service
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.reportingService.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "bugbounty-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reporting-service
    spec:
      {{- include "bugbounty-platform.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "bugbounty-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.reportingService.podSecurityContext | nindent 8 }}
      containers:
        - name: reporting-service
          securityContext:
            {{- toYaml .Values.reportingService.securityContext | nindent 12 }}
          image: {{ include "bugbounty-platform.image" (dict "image" .Values.reportingService.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.reportingService.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.reportingService.service.targetPort }}
              protocol: TCP
          livenessProbe:
            {{- if .Values.livenessProbe.enabled }}
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            {{- end }}
          readinessProbe:
            {{- if .Values.readinessProbe.enabled }}
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            {{- end }}
          resources:
            {{- toYaml .Values.reportingService.resources | nindent 12 }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.reportingService.service.targetPort | quote }}
            - name: DATABASE_URL
              value: "postgresql://{{ include "bugbounty-platform.database.user" . }}:$(POSTGRES_PASSWORD)@{{ include "bugbounty-platform.database.host" . }}:{{ include "bugbounty-platform.database.port" . }}/{{ include "bugbounty-platform.database.name" . }}"
            - name: REDIS_URL
              value: "redis://default:$(REDIS_PASSWORD)@{{ include "bugbounty-platform.redis.host" . }}:{{ include "bugbounty-platform.redis.port" . }}"
            - name: EXECUTIVE_REPORT_ENABLED
              value: {{ .Values.reportingService.config.reportTemplates.executive.enabled | quote }}
            - name: EXECUTIVE_REPORT_FORMAT
              value: {{ .Values.reportingService.config.reportTemplates.executive.format | quote }}
            - name: TECHNICAL_REPORT_ENABLED
              value: {{ .Values.reportingService.config.reportTemplates.technical.enabled | quote }}
            - name: TECHNICAL_REPORT_FORMAT
              value: {{ .Values.reportingService.config.reportTemplates.technical.format | quote }}
            - name: DETAILED_REPORT_ENABLED
              value: {{ .Values.reportingService.config.reportTemplates.detailed.enabled | quote }}
            - name: DETAILED_REPORT_FORMAT
              value: {{ .Values.reportingService.config.reportTemplates.detailed.format | quote }}
            - name: DAILY_REPORTS_ENABLED
              value: {{ .Values.reportingService.config.scheduling.dailyReports | quote }}
            - name: WEEKLY_REPORTS_ENABLED
              value: {{ .Values.reportingService.config.scheduling.weeklyReports | quote }}
            - name: MONTHLY_REPORTS_ENABLED
              value: {{ .Values.reportingService.config.scheduling.monthlyReports | quote }}
            - name: EMAIL_ENABLED
              value: {{ .Values.reportingService.config.distribution.email.enabled | quote }}
            - name: SMTP_HOST
              value: {{ .Values.reportingService.config.distribution.email.smtpHost | quote }}
            - name: SMTP_PORT
              value: {{ .Values.reportingService.config.distribution.email.smtpPort | quote }}
            - name: SLACK_ENABLED
              value: {{ .Values.reportingService.config.distribution.slack.enabled | quote }}
            - name: SLACK_WEBHOOK_URL
              value: {{ .Values.reportingService.config.distribution.slack.webhookUrl | quote }}
            - name: REPORTS_RETENTION_DAYS
              value: {{ .Values.reportingService.config.storage.reportsRetentionDays | quote }}
            - name: MAX_STORAGE_SIZE
              value: {{ .Values.reportingService.config.storage.maxStorageSize | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-postgresql
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bugbounty-platform.fullname" . }}-redis
                  key: password
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.reportingService.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- with .Values.reportingService.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- with .Values.reportingService.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.reportingService.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reportingService.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.reportingService.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bugbounty-platform.reportingService.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: reporting-service
spec:
  type: {{ .Values.reportingService.service.type }}
  ports:
    - port: {{ .Values.reportingService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bugbounty-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: reporting-service
---
{{- if .Values.reportingService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-reporting-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: reporting-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "bugbounty-platform.fullname" . }}-reporting-service
  minReplicas: {{ .Values.reportingService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.reportingService.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.reportingService.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.reportingService.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.reportingService.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.reportingService.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}