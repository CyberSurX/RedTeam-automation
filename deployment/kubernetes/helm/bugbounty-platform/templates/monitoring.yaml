{{/*
Create Prometheus monitoring configuration
*/}}
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: {{ include "bugbounty-platform.fullname" . }}-api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bugbounty-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  selector:
    matchLabels:
      {{- include "bugbounty-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
