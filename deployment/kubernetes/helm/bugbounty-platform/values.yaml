# Default values for bugbounty-platform.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  replicaCount: 3

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 3
  
  image:
    registry: docker.io
    repository: bugbounty/frontend
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}
  
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - host: app.bugbounty-platform.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: app-tls
        hosts:
          - app.bugbounty-platform.com
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# API Gateway Configuration
apiGateway:
  enabled: true
  replicaCount: 3
  
  image:
    registry: docker.io
    repository: bugbounty/api-gateway
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    hosts:
      - host: api.bugbounty-platform.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-tls
        hosts:
          - api.bugbounty-platform.com
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # API Gateway specific settings
  config:
    rateLimiting:
      enabled: true
      requestsPerMinute: 1000
      burstSize: 100
    cors:
      enabled: true
      allowedOrigins:
        - "https://app.bugbounty-platform.com"
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowedHeaders:
        - Authorization
        - Content-Type
        - X-Requested-With
    auth:
      jwtSecret: ""
      tokenExpiration: "24h"
    services:
      recon: "http://recon-service:8080"
      scanning: "http://scanning-service:8080"
      exploitation: "http://exploitation-service:8080"
      triage: "http://triage-service:8080"
      reporting: "http://reporting-service:8080"

# Recon Service Configuration
reconService:
  enabled: true
  replicaCount: 2
  
  image:
    registry: docker.io
    repository: bugbounty/recon-service
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Recon Service specific settings
  config:
    tools:
      amass:
        enabled: true
        configPath: "/etc/amass/config.ini"
      subfinder:
        enabled: true
        configPath: "/etc/subfinder/config.yaml"
      assetfinder:
        enabled: true
      httpx:
        enabled: true
        threads: 50
    rateLimiting:
      requestsPerSecond: 10
      maxConcurrentJobs: 5
    storage:
      resultsRetentionDays: 30
      maxStorageSize: "10Gi"

# Scanning Service Configuration
scanningService:
  enabled: true
  replicaCount: 3
  
  image:
    registry: docker.io
    repository: bugbounty/scanning-service
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 1500m
      memory: 3Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Scanning Service specific settings
  config:
    scanners:
      nmap:
        enabled: true
        maxHosts: 100
        maxPorts: 1000
        timeout: "5m"
      nikto:
        enabled: true
        timeout: "10m"
      sqlmap:
        enabled: true
        maxThreads: 5
        timeout: "30m"
      wapiti:
        enabled: true
        maxUrls: 500
        timeout: "20m"
    rateLimiting:
      maxConcurrentScans: 3
      scanTimeout: "1h"
    storage:
      resultsRetentionDays: 60
      maxStorageSize: "20Gi"

# Exploitation Service Configuration
exploitationService:
  enabled: true
  replicaCount: 2
  
  image:
    registry: docker.io
    repository: bugbounty/exploitation-service
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Exploitation Service specific settings
  config:
    exploitModules:
      sqlInjection:
        enabled: true
        riskLevel: "medium"
      xss:
        enabled: true
        riskLevel: "medium"
      commandInjection:
        enabled: true
        riskLevel: "high"
      pathTraversal:
        enabled: true
        riskLevel: "medium"
    rateLimiting:
      maxConcurrentExploits: 2
      exploitTimeout: "45m"
    safety:
      requireManualApproval: true
      maxImpactLevel: "medium"
      allowedExploitTypes:
        - "sql_injection"
        - "xss"
        - "path_traversal"

# Triage Service Configuration
triageService:
  enabled: true
  replicaCount: 3
  
  image:
    registry: docker.io
    repository: bugbounty/triage-service
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Triage Service specific settings
  config:
    deduplication:
      enabled: true
      similarityThreshold: 0.85
      timeWindow: "24h"
    severityCalculation:
      cvssWeight: 0.4
      impactWeight: 0.3
      exploitabilityWeight: 0.3
    automation:
      autoCloseDuplicates: true
      autoAssignLowSeverity: true
      autoEscalateCritical: true
    integration:
      hackerone:
        enabled: true
        apiUrl: "https://api.hackerone.com"
      bugcrowd:
        enabled: true
        apiUrl: "https://api.bugcrowd.com"

# Reporting Service Configuration
reportingService:
  enabled: true
  replicaCount: 2
  
  image:
    registry: docker.io
    repository: bugbounty/reporting-service
    tag: latest
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
    annotations: {}
  
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Reporting Service specific settings
  config:
    reportTemplates:
      executive:
        enabled: true
        format: "pdf"
      technical:
        enabled: true
        format: "html"
      detailed:
        enabled: true
        format: "json"
    scheduling:
      dailyReports: true
      weeklyReports: true
      monthlyReports: true
    distribution:
      email:
        enabled: true
        smtpHost: "smtp.gmail.com"
        smtpPort: 587
      slack:
        enabled: true
        webhookUrl: ""
    storage:
      reportsRetentionDays: 365
      maxStorageSize: "50Gi"

# PostgreSQL Configuration
postgresql:
  enabled: true
  
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 15.4.0-debian-11-r45
    pullPolicy: IfNotPresent
  
  auth:
    enablePostgresUser: true
    postgresPassword: ""
    username: "bugbounty"
    password: ""
    database: "bugbounty"
    existingSecret: ""
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"
      replicationPasswordKey: "replication-password"
  
  architecture: standalone
  
  primary:
    name: primary
    persistence:
      enabled: true
      existingClaim: ""
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 100Gi
      annotations: {}
      mountPath: /bitnami/postgresql
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
    nodeSelector: {}
    tolerations: []
    affinity: {}
  
  readReplicas:
    name: read
    replicaCount: 0
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 100Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
  
  metrics:
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/postgres-exporter
      tag: 0.13.2-debian-11-r25
    service:
      type: ClusterIP
      port: 9187
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

