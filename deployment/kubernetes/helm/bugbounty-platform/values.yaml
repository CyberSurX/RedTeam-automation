      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

# Prometheus Configuration
prometheus:
  enabled: true
  
  image:
    registry: docker.io
    repository: prom/prometheus
    tag: v2.47.0
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
    annotations: {}
  
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 50Gi
    annotations: {}
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  config:
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
      
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

# Grafana Configuration
grafana:
  enabled: true
  
  image:
    registry: docker.io
    repository: grafana/grafana
    tag: 10.1.1
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
    annotations: {}
  
  adminPassword: "admin"
  
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    annotations: {}
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  dashboards:
    enabled: true
    configMapName: "grafana-dashboards"
    dashboards:
      - name: "bugbounty-overview"
        file: "dashboards/overview.json"
      - name: "bugbounty-microservices"
        file: "dashboards/microservices.json"
      - name: "bugbounty-database"
        file: "dashboards/database.json"
      - name: "bugbounty-cache"
        file: "dashboards/cache.json"
      - name: "bugbounty-infrastructure"
        file: "dashboards/infrastructure.json"
      - name: "bugbounty-security"
        file: "dashboards/security.json"
  
  datasources:
    enabled: true
    configMapName: "grafana-datasources"
    datasources:
      - name: "Prometheus"
        type: "prometheus"
        url: "http://prometheus:9090"
        access: "proxy"
        isDefault: true
      - name: "PostgreSQL"
        type: "postgres"
        url: "postgresql:5432"
        database: "bugbounty"
        user: "bugbounty"
        password: "$POSTGRES_PASSWORD"

# Network Policy Configuration
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    namespaceSelector: {}
    podSelector: {}
  egress:
    enabled: true
    namespaceSelector: {}
    podSelector: {}

# Pod Security Policy Configuration
podSecurityPolicy:
  enabled: true
  
# RBAC Configuration
rbac:
  enabled: true
  create: true

# Service Account Configuration
serviceAccount:
  enabled: true
  annotations: {}
  name: ""

# Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts: []
  tls: []

# Cert Manager Configuration
certManager:
  enabled: true
  clusterIssuer: "letsencrypt-prod"
  email: "admin@bugbounty-platform.com"

# Network Policies
networkPolicies:
  enabled: true
  
  frontend:
    enabled: true
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                name: ingress-nginx
        ports:
          - protocol: TCP
            port: 80
    egress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: api-gateway
        ports:
          - protocol: TCP
            port: 8080
  
  apiGateway:
    enabled: true
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: frontend
        ports:
          - protocol: TCP
            port: 8080
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: prometheus
        ports:
          - protocol: TCP
            port: 8080
    egress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: recon-service
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: scanning-service
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: exploitation-service
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: triage-service
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: reporting-service
        ports:
          - protocol: TCP
            port: 8080
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: postgresql
        ports:
          - protocol: TCP
            port: 5432
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: redis
        ports:
          - protocol: TCP
            port: 6379

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

# Health Checks
livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Environment Variables
env:
  - name: NODE_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: METRICS_ENABLED
    value: "true"
  - name: HEALTH_CHECK_ENABLED
    value: "true"

# Extra Environment Variables
extraEnv: []

# Extra Volume Mounts
extraVolumeMounts: []

# Extra Volumes
extraVolumes: []

# Init Containers
initContainers: []

# Sidecar Containers
sidecars: []