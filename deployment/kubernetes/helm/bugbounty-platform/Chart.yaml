apiVersion: v2
name: bugbounty-platform
description: A comprehensive Helm chart for Bug Bounty Automation Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://bugbounty-platform.com
sources:
  - https://github.com/bugbounty-platform/bugbounty-platform
maintainers:
  - name: Bug Bounty Platform Team
    email: support@bugbounty-platform.com
    url: https://bugbounty-platform.com
keywords:
  - bugbounty
  - security
  - automation
  - reconnaissance
  - vulnerability
  - scanning
  - cybersecurity
annotations:
  category: Security
  licenses: Apache-2.0
dependencies:
  - name: postgresql
    version: 12.12.10
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.15.6
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 24.5.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 7.0.8
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled