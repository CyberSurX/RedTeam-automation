name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          # Install all workspace dependencies (root handles backend via hoisted packages)
          npm ci

      - name: Build frontend & backend
        run: |
          npm run build

      - name: Lint (ESLint)
        run: |
          npm run lint

      - name: Type checking
        run: |
          npm run type-check

      - name: Unit tests
        run: |
          npm run test:unit

      - name: Integration tests (requires PostgreSQL)
        uses: Harmon758/postgresql-action@v1
        with:
          postgres-version: '15'
          postgres-db: redteam_automation_test
          postgres-user: postgres
          postgres-password: postgres
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/redteam_automation_test
        # Run integration tests after DB is ready
        run: |
          npm run test:integration

      - name: Security scan (optional)
        if: false # placeholder – enable when script is ready
        run: |
          npm run test:security

