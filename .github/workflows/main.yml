name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Validate manifests and lockfile
        run: |
          node -e "JSON.parse(require('node:fs').readFileSync('package.json','utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('package-lock.json','utf8'))"
          if [ -f api/package.json ]; then
            node -e "JSON.parse(require('node:fs').readFileSync('api/package.json','utf8'))"
          fi
          if [ -f api/package-lock.json ]; then
            node -e "JSON.parse(require('node:fs').readFileSync('api/package-lock.json','utf8'))"
          fi
          npm ci --ignore-scripts --dry-run
          
      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Type Checking
        run: npm run type-check

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        run: npm run build:frontend

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Production Deployment Trigger
        run: echo "Code is validated and ready for production deployment."
